<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paddle Finder Quiz - BePickleballer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.css" rel="stylesheet">
<link rel="stylesheet" href="tailwind.css">
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen antialiased font-sans">

<div id="bp-quiz-app" class="min-h-screen flex flex-col">

  <div class="max-w-2xl w-full mx-auto bg-white min-h-screen flex flex-col">
    <!-- Header -->
      <header class="bg-white border-b border-slate-200">
        <div class="max-w-2xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-3">
          <div class="flex items-center gap-3 min-w-0">
            <span class="text-base sm:text-lg font-bold text-brand-700 truncate">BePickleballer</span>
            <span class="hidden sm:inline text-slate-300">|</span>
            <span class="hidden sm:inline text-xs font-semibold text-slate-500 uppercase tracking-wider">Paddle Finder Quiz</span>
          </div>
          <div class="text-xs text-slate-500 flex items-center gap-1 whitespace-nowrap">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span class="hidden xs:inline">Takes about</span> 3-5 minutes
          </div>
        </div>
      </header>

      <!-- Progress -->
      <div id="bp-progress-section" class="bg-white border-b border-slate-200">
        <div class="max-w-2xl mx-auto px-4 sm:px-6 py-3">
          <div class="flex items-center justify-between text-xs text-slate-500 mb-2">
            <span id="bp-progress-label" class="font-semibold text-brand-700">0% Complete</span>
            <span id="bp-progress-meta">Question 1 of 31</span>
          </div>
          <div class="w-full bg-slate-200 rounded-full h-1.5 overflow-hidden">
            <div id="bp-progress-bar" class="bg-brand-600 h-1.5 rounded-full transition-all duration-300" style="width: 0%"></div>
          </div>
        </div>
      </div>

      <!-- Question / results slot -->
      <main class="flex-1 max-w-2xl w-full mx-auto px-4 sm:px-6 py-6 sm:py-10">
        <div id="bp-loading" class="flex flex-col items-center justify-center py-16 text-slate-500">
          <svg class="w-8 h-8 animate-spin text-brand-600" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          <p class="mt-3 text-sm font-medium">Loading quiz...</p>
        </div>
        <div id="bp-question-slot" class="hidden"></div>
        <div id="bp-result-slot" class="hidden"></div>
      </main>

      <!-- Footer trust -->
      <footer class="bp-trust-footer bg-white border-t border-slate-200">
        <div class="max-w-2xl mx-auto px-4 sm:px-6 py-3 text-center text-slate-500 flex items-center justify-center flex-wrap gap-x-3 gap-y-1">
          <span class="bp-trust-item inline-flex items-center gap-1.5"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" class="text-emerald-500"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>100% Free</span>
          <span class="bp-trust-sep text-slate-300">|</span>
          <span class="bp-trust-item inline-flex items-center gap-1.5"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" class="text-emerald-500"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>No email required</span>
          <span class="bp-trust-sep text-slate-300">|</span>
          <span class="bp-trust-item inline-flex items-center gap-1.5"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" class="text-emerald-500"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>Unbiased recommendations</span>
        </div>
      </footer>
  </div>
  
</div>

<script type="module" src="quiz.js"></script>
</body>
</html>
